<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Escenarios D&D con IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="header-logo">
                <h1>Generador de Escenarios D&D con IA</h1>
            </div>
            <button id="btnAgregar" class="btn-agregar">+ Crear Escenario</button>
        </div>
        
        <div id="listaTextos" class="lista-textos">
            <div style="text-align: center; padding: 20px;">Cargando escenarios...</div>
        </div>
    </div>

    <!-- Modal para crear nuevo escenario con IA -->
    <div id="modalAgregar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-left">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="modal-logo">
                    <h2>Crear Nuevo Escenario con IA</h2>
                </div>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="selector-group">
                    <label for="raza">Raza predominante:</label>
                    <select id="raza" class="selector">
                        <!-- Razas originales -->
                        <option value="humanos">👥 Humanos</option>
                        <option value="elfos">🧝 Elfos</option>
                        <option value="alto elfo">✨ Alto Elfo</option>
                        <option value="enanos">⛏️ Enanos</option>
                        <option value="enano del valle">🏔️ Enano del Valle</option>
                        <option value="orcos">👹 Orcos</option>
                        <option value="medio orco">⚔️ Medio Orco</option>
                        <option value="duendes">🔧 Gnomos</option>
                        <option value="duende de roca">🪨 Gnomos de Roca</option>
                        <option value="halflings">🍃 Halflings</option>
                        <option value="medio elfo">🌙 Medio Elfo</option>
                        <option value="tieflings">🔥 Tieflings</option>
                        <option value="dragonborns">🐲 Dragonborns</option>
                        <option value="tritones">🌊 Tritones</option>
                    </select>
                </div>

                <div class="selector-group">
                    <label for="ambiente">Ambiente:</label>
                    <select id="ambiente" class="selector">
                        <!-- Ambientes naturales originales -->
                        <option value="bosques">🌲 Bosques</option>
                        <option value="montañas">⛰️ Montañas</option>
                        <option value="desiertos">🏜️ Desiertos</option>
                        <option value="junglas">🌴 Junglas</option>
                        <option value="cuevas">🕳️ Cuevas</option>
                        <option value="pantanos">🐊 Pantanos</option>
                        <option value="praderas">🌾 Praderas</option>
                        <option value="tundra">❄️ Tundra</option>
                        <option value="costas">🌊 Costas</option>
                        <option value="steampunk">⚙️ Steampunk</option>
                        <option value="postapocaliptico">☢️ Postapocalíptico</option>
                        <option value="gotico">🦇 Gótico</option>
                        <option value="medieval">🏰 Medieval</option>
                        <option value="japones">🏯 Japonés feudal</option>
                        <option value="cristal">🔮 Cavernas de cristal</option>
                        <option value="flotante">☁️ Islas flotantes</option>
                        <option value="volcanico">🌋 Tierras volcánicas</option>
                    </select>
                </div>

                <div class="selector-group">
                    <label for="extension">Extensión del territorio:</label>
                    <select id="extension" class="selector">
                        <option value="pueblo">🏘️ Pueblo</option>
                        <option value="reino">👑 Reino</option>
                        <option value="región">🗺️ Región</option>
                    </select>
                </div>

                <!-- Botón para generar con IA -->
                <button id="btnGenerarIA" class="btn-generar-ia">
                    ✨ Generar Escenario con IA
                </button>

                <!-- Indicador de carga con elementos en línea -->
                <div id="loadingIndicator" style="display: none;" class="loading-indicator">
                    <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="height: 30px; width: auto; animation: pulse 1.5s ease-in-out infinite;">
                        <p style="margin: 0; color: #e0e0e0; font-weight: 500;">La IA está creando un escenario épico...</p>
                    </div>
                    <div class="spinner" style="margin-top: 15px;"></div>
                </div>

                <!-- Vista previa del escenario generado por IA -->
                <div class="preview-group" id="previewGroup" style="display: none;">
                    <label>📜 Escenario generado por IA:</label>
                    <div id="vistaPrevia" class="vista-previa-ia">
                        <!-- Aquí se mostrará el escenario generado -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btnCancelar" class="btn-cancelar">Cancelar</button>
                <button id="btnGuardar" class="btn-guardar" disabled>💾 Guardar Escenario</button>
            </div>
        </div>
    </div>

    <!-- Añadir la animación pulse si no existe en styles.css -->
    <style>
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
